<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    
    <title>Planificador de Menú Natural Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        :root {
            --bg-page: #f4f4f5; 
            --bg-card: #ffffff;
            --text-primary: #18181b; 
            --text-secondary: #71717a; 
            --accent-main: #d97706; 
            --accent-hover: #b45309; 
            --danger: #e11d48; 
            --danger-hover: #be123c;
            --border-light: #e4e4e7;
            --results-bg: #fffbeb; 
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0,0,0,0.04);
        }

        h1 {
            text-align: center;
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }
        
        h1 ion-icon { color: var(--accent-main); font-size: 2.2rem; }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .ingredient-group {
            border-top: 1px solid var(--border-light);
            padding-top: 25px;
            margin-bottom: 25px;
        }

        .ingredient-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .ingredient-row input[type="text"] {
            flex: 2;
            text-align: left;
            padding-left: 15px;
        }

        .ingredient-row input[type="number"] {
            flex: 1;
        }

        /* FIX DEFINITIVO PARA SAFARI Y CHROME MÓVIL */
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background-color: #ffffff !important;
            color: #18181b !important;
            -webkit-text-fill-color: #18181b !important;
            opacity: 1 !important;
            appearance: none; 
            transition: all 0.2s;
        }
        
        input::placeholder {
            color: #a1a1aa !important;
            -webkit-text-fill-color: #a1a1aa !important;
            opacity: 1;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent-main);
            box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.15);
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
        }

        .btn-icon:hover { background-color: #ffe4e6; color: var(--danger-hover); transform: scale(1.05); }

        .btn-add {
            background-color: transparent;
            color: var(--accent-main);
            border: 2px dashed rgba(217, 119, 6, 0.4);
            margin-top: 5px;
            margin-bottom: 30px;
            box-shadow: none;
            border-radius: 12px;
        }

        .btn-add:hover {
            background-color: rgba(217, 119, 6, 0.05);
            border-color: var(--accent-main);
            transform: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-main);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            -webkit-appearance: none;
        }

        button:hover { background-color: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(217, 119, 6, 0.3); }

        .form-group-config {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .form-group-config label { font-weight: 500; display: flex; align-items: center; gap: 8px; color: var(--text-primary);}
        .form-group-config label ion-icon { color: var(--accent-main); font-size: 1.3rem; }
        .form-group-config input { width: 90px; }

        .results {
            margin-top: 35px;
            padding: 30px;
            background-color: var(--results-bg);
            border-radius: 18px;
            display: none;
            border: 1px solid rgba(217, 119, 6, 0.1);
        }

        .results h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--text-primary); }
        .results h2 ion-icon { color: var(--accent-main); font-size: 1.5rem; }

        .result-item {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }
        
        .result-item span:first-child { font-weight: 500; color: var(--text-primary); }
        .result-item span:last-child { color: var(--accent-main); font-weight: 700; font-size: 1.1rem; }

        .total-highlight { background-color: var(--accent-main); border-color: var(--accent-main); }
        .total-highlight span:first-child { color: #ffffff; font-weight: 600; }
        .total-highlight span:last-child { color: #ffffff; font-size: 1.25rem; font-weight: 700; }

    </style>
</head>
<body>

<div class="container">
    <h1><ion-icon name="paw"></ion-icon> Planificador Mía</h1>
    <p class="subtitle">Personaliza los ingredientes y requerimientos diarios:</p>
    
    <div id="lista-ingredientes" class="ingredient-group">
        </div>
    
    <button class="btn-add" onclick="agregarFilaIngrediente('', '')">
        <ion-icon name="add-circle-outline"></ion-icon> Añadir nuevo ingrediente
    </button>
    
    <div class="form-group-config">
        <label><ion-icon name="calendar-outline"></ion-icon> Días de Prep:</label>
        <input type="number" id="dias" value="7" min="1" max="30">
    </div>

    <div class="form-group-config">
        <label><ion-icon name="restaurant-outline"></ion-icon> Comidas al día:</label>
        <input type="number" id="comidas" value="2" min="1" max="5">
    </div>

    <button onclick="calcularMenu()" style="margin-top: 25px;">
        <ion-icon name="calculator"></ion-icon> Calcular Menú
    </button>

    <div class="results" id="resultados">
        <h2><ion-icon name="scale-outline"></ion-icon> Porción por Bolsa</h2>
        <div id="lista-bolsa"></div>
        
        <h2 style="margin-top: 30px;"><ion-icon name="cart-outline"></ion-icon> Lista de Compras Total</h2>
        <div id="lista-compras"></div>
    </div>
</div>

<script>
    const ingredientesIniciales = [
        { nombre: "Pollo Magro", gramos: 350 },
        { nombre: "Huevo", gramos: 60 },
        { nombre: "Batata", gramos: 80 },
        { nombre: "Apio", gramos: 90 },
        { nombre: "Arándanos", gramos: 15 }
    ];

    window.onload = function() {
        ingredientesIniciales.forEach(ing => agregarFilaIngrediente(ing.nombre, ing.gramos));
    };

    function agregarFilaIngrediente(nombre, gramos) {
        const contenedor = document.getElementById('lista-ingredientes');
        const fila = document.createElement('div');
        fila.className = 'ingredient-row';
        
        fila.innerHTML = `
            <input type="text" class="ing-name" placeholder="Nombre (ej. Salmón)" value="${nombre}">
            <input type="number" class="ing-weight" placeholder="Gramos" value="${gramos}" min="0">
            <button class="btn-icon" onclick="this.parentElement.remove()" title="Eliminar ingrediente">
                <ion-icon name="trash-outline"></ion-icon>
            </button>
        `;
        contenedor.appendChild(fila);
    }

    function calcularMenu() {
        const comidas = parseInt(document.getElementById('comidas').value) || 1;
        const dias = parseInt(document.getElementById('dias').value) || 1;
        const filas = document.querySelectorAll('.ingredient-row');
        
        let htmlBolsa = '';
        let totalBolsa = 0;
        let htmlCompras = '';
        let totalCompras = 0;

        filas.forEach(fila => {
            const nombre = fila.querySelector('.ing-name').value || 'Ingrediente sin nombre';
            const gramosDiarios = parseFloat(fila.querySelector('.ing-weight').value) || 0;

            if (gramosDiarios > 0) {
                const gramosPorBolsa = gramosDiarios / comidas;
                totalBolsa += gramosPorBolsa;
                htmlBolsa += `<div class="result-item"><span>${nombre}</span><span>${gramosPorBolsa.toFixed(1)} g</span></div>`;
                
                const gramosTotal = gramosDiarios * dias;
                totalCompras += gramosTotal;
                let textoCompra = gramosTotal >= 1000 ? `${(gramosTotal/1000).toFixed(2)} kg` : `${gramosTotal} g`;
                htmlCompras += `<div class="result-item"><span>${nombre}</span><span>${textoCompra}</span></div>`;
            }
        });

        if(totalBolsa === 0) {
            alert("Por favor, agrega al menos un ingrediente con peso mayor a 0.");
            return;
        }

        htmlBolsa += `<div class="result-item total-highlight"><span>TOTAL BOLSA</span><span>${totalBolsa.toFixed(1)} g</span></div>`;
        let textoTotalCompras = totalCompras >= 1000 ? `${(totalCompras/1000).toFixed(2)} kg` : `${totalCompras} g`;
        htmlCompras += `<div class="result-item total-highlight"><span>TOTAL A PREPARAR</span><span>${textoTotalCompras}</span></div>`;

        document.getElementById('lista-bolsa').innerHTML = htmlBolsa;
        document.getElementById('lista-compras').innerHTML = htmlCompras;
        document.getElementById('resultados').style.display = 'block';
        
        setTimeout(() => {
            document.getElementById('resultados').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }
</script>

</body>
</html>
