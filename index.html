<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Menú Natural Dinámico</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        :root {
            --bg-page: #f9fafb;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent-main: #0ea5e9;
            --accent-hover: #0284c7;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border-light: #e5e7eb;
            --results-bg: #f1f5f9;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        h1 ion-icon { color: var(--accent-main); font-size: 2.2rem; }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .ingredient-group {
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
            margin-bottom: 25px;
        }

        /* Diseño dinámico de filas */
        .ingredient-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .ingredient-row input[type="text"] {
            flex: 2;
            text-align: left;
            padding-left: 15px;
        }

        .ingredient-row input[type="number"] {
            flex: 1;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fff;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent-main);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        /* Botones de acción pequeña (eliminar) */
        .btn-icon {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
        }

        .btn-icon:hover {
            background-color: #fee2e2;
            color: var(--danger-hover);
            transform: scale(1.05);
        }

        /* Botón añadir ingrediente */
        .btn-add {
            background-color: transparent;
            color: var(--accent-main);
            border: 2px dashed var(--accent-main);
            margin-top: 5px;
            margin-bottom: 25px;
            box-shadow: none;
        }

        .btn-add:hover {
            background-color: rgba(14, 165, 233, 0.05);
            box-shadow: none;
            transform: none;
        }

        /* Botón Principal */
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-main);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(14, 165, 233, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover { background-color: var(--accent-hover); transform: translateY(-1px); }

        .form-group-config {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group-config label { font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .form-group-config label ion-icon { color: var(--text-secondary); font-size: 1.2rem; }
        .form-group-config input { width: 90px; }

        .results {
            margin-top: 35px;
            padding: 30px;
            background-color: var(--results-bg);
            border-radius: 16px;
            display: none;
            border: 1px solid var(--border-light);
        }

        .results h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .results h2 ion-icon { color: var(--accent-main); font-size: 1.4rem; }

        .result-item {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .result-item span:first-child { font-weight: 500; }
        .result-item span:last-child { color: var(--accent-main); font-weight: 600; font-size: 1.1rem; }

        .total-highlight { background-color: var(--accent-main); border-color: var(--accent-main); }
        .total-highlight span:first-child { color: #ffffff; font-weight: 600; }
        .total-highlight span:last-child { color: #ffffff; font-size: 1.2rem; font-weight: 700; }

    </style>
</head>
<body>

<div class="container">
    <h1><ion-icon name="paw-outline"></ion-icon> Planificador Mía</h1>
    <p class="subtitle">Personaliza los ingredientes y requerimientos diarios:</p>
    
    <div id="lista-ingredientes" class="ingredient-group">
        </div>
    
    <button class="btn-add" onclick="agregarFilaIngrediente('', '')">
        <ion-icon name="add-circle-outline"></ion-icon> Añadir nuevo ingrediente
    </button>
    
    <div class="form-group-config">
        <label><ion-icon name="basket-outline"></ion-icon> Días de Prep:</label>
        <input type="number" id="dias" value="7" min="1" max="30">
    </div>

    <div class="form-group-config">
        <label><ion-icon name="pizza-outline"></ion-icon> Comidas al día:</label>
        <input type="number" id="comidas" value="2" min="1" max="5">
    </div>

    <button onclick="calcularMenu()" style="margin-top: 20px;">
        <ion-icon name="calculator-outline"></ion-icon> Calcular Menú
    </button>

    <div class="results" id="resultados">
        <h2><ion-icon name="bag-check-outline"></ion-icon> Porción por Bolsa</h2>
        <div id="lista-bolsa"></div>
        
        <h2 style="margin-top: 30px;"><ion-icon name="cart-outline"></ion-icon> Lista de Compras Total</h2>
        <div id="lista-compras"></div>
    </div>
</div>

<script>
    // Ingredientes base al cargar la página por primera vez
    const ingredientesIniciales = [
        { nombre: "Pollo Magro", gramos: 350 },
        { nombre: "Huevo", gramos: 60 },
        { nombre: "Batata", gramos: 80 },
        { nombre: "Apio", gramos: 90 },
        { nombre: "Arándanos", gramos: 15 }
    ];

    // Función que se ejecuta al cargar la página
    window.onload = function() {
        ingredientesIniciales.forEach(ing => agregarFilaIngrediente(ing.nombre, ing.gramos));
    };

    // Función para añadir una nueva fila al formulario
    function agregarFilaIngrediente(nombre, gramos) {
        const contenedor = document.getElementById('lista-ingredientes');
        
        const fila = document.createElement('div');
        fila.className = 'ingredient-row';
        
        fila.innerHTML = `
            <input type="text" class="ing-name" placeholder="Nombre (ej. Salmón)" value="${nombre}">
            <input type="number" class="ing-weight" placeholder="Gramos" value="${gramos}" min="0">
            <button class="btn-icon" onclick="this.parentElement.remove()" title="Eliminar ingrediente">
                <ion-icon name="trash-outline"></ion-icon>
            </button>
        `;
        
        contenedor.appendChild(fila);
    }

    // Función de cálculo principal
    function calcularMenu() {
        const comidas = parseInt(document.getElementById('comidas').value) || 1;
        const dias = parseInt(document.getElementById('dias').value) || 1;
        
        const filas = document.querySelectorAll('.ingredient-row');
        
        let htmlBolsa = '';
        let totalBolsa = 0;
        let htmlCompras = '';
        let totalCompras = 0;

        filas.forEach(fila => {
            const nombre = fila.querySelector('.ing-name').value || 'Ingrediente sin nombre';
            const gramosDiarios = parseFloat(fila.querySelector('.ing-weight').value) || 0;

            if (gramosDiarios > 0) {
                // Cálculo 1: Por bolsa
                const gramosPorBolsa = gramosDiarios / comidas;
                totalBolsa += gramosPorBolsa;
                htmlBolsa += `<div class="result-item"><span>${nombre}</span><span>${gramosPorBolsa.toFixed(1)} g</span></div>`;
                
                // Cálculo 2: Compras
                const gramosTotal = gramosDiarios * dias;
                totalCompras += gramosTotal;
                let textoCompra = gramosTotal >= 1000 ? `${(gramosTotal/1000).toFixed(2)} kg` : `${gramosTotal} g`;
                htmlCompras += `<div class="result-item"><span>${nombre}</span><span>${textoCompra}</span></div>`;
            }
        });

        if(totalBolsa === 0) {
            alert("Por favor, agrega al menos un ingrediente con peso mayor a 0.");
            return;
        }

        // Totales
        htmlBolsa += `<div class="result-item total-highlight"><span>TOTAL BOLSA</span><span>${totalBolsa.toFixed(1)} g</span></div>`;
        let textoTotalCompras = totalCompras >= 1000 ? `${(totalCompras/1000).toFixed(2)} kg` : `${totalCompras} g`;
        htmlCompras += `<div class="result-item total-highlight"><span>TOTAL A PREPARAR</span><span>${textoTotalCompras}</span></div>`;

        // Mostrar resultados
        document.getElementById('lista-bolsa').innerHTML = htmlBolsa;
        document.getElementById('lista-compras').innerHTML = htmlCompras;
        document.getElementById('resultados').style.display = 'block';
        
        document.getElementById('resultados').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
