<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenco Natural</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream:   #faf6ef;
            --warm:    #f0e8d8;
            --gold:    #c8922a;
            --gold-dk: #a57320;
            --ink:     #1c1612;
            --muted:   #7a6e64;
            --danger:  #c0392b;
            --card:    #ffffff;
            --border:  #e8dfd0;
            --shadow:  0 2px 20px rgba(28,22,18,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 16px 60px;
            background-image:
                radial-gradient(ellipse at 10% 0%, rgba(200,146,42,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 100%, rgba(200,146,42,0.06) 0%, transparent 55%);
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 12px;
        }

        .paw-ring {
            width: 72px; height: 72px;
            background: var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 4px 18px rgba(200,146,42,0.35);
            font-size: 2rem;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.1rem;
            letter-spacing: -0.5px;
            color: var(--ink);
            line-height: 1.1;
        }

        .subtitle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 28px 24px;
            margin-bottom: 16px;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 16px;
        }

        /* ── INGREDIENT ROWS ── */
        .ingredient-row {
            display: grid;
            grid-template-columns: 1fr 90px 36px;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        /* ── INPUTS ── */
        input[type="text"],
        input[type="number"] {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--ink);
            background: var(--cream);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 11px 13px;
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-text-fill-color: var(--ink);
            opacity: 1;
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: var(--muted);
            -webkit-text-fill-color: var(--muted);
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200,146,42,0.12);
            background: #fff;
        }

        input[type="number"] { text-align: center; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type="number"] { -moz-appearance: textfield; }

        /* ── TRASH BUTTON ── */
        .btn-trash {
            background: none;
            border: none;
            cursor: pointer;
            color: #c0a090;
            font-size: 1.15rem;
            padding: 6px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.2s, background 0.2s;
            -webkit-appearance: none;
            width: auto;
            box-shadow: none;
        }

        .btn-trash:hover { color: var(--danger); background: #fdecea; }

        /* ── ADD BUTTON ── */
        .btn-add {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            background: transparent;
            color: var(--gold);
            border: 1.5px dashed rgba(200,146,42,0.4);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: background 0.2s, border-color 0.2s;
            box-shadow: none;
            -webkit-appearance: none;
        }

        .btn-add:hover {
            background: rgba(200,146,42,0.05);
            border-color: var(--gold);
        }

        /* ── CONFIG ROW ── */
        .config-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .config-row:last-child { border-bottom: none; }

        .config-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .config-label .icon { font-size: 1.1rem; }
        .config-row input[type="number"] { width: 80px; }

        /* ── CALCULATE BUTTON ── */
        .btn-calc {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 16px rgba(200,146,42,0.35);
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .btn-calc:hover {
            background: var(--gold-dk);
            transform: translateY(-2px);
            box-shadow: 0 7px 22px rgba(200,146,42,0.4);
        }

        .btn-calc:active { transform: translateY(0); }

        /* ── RESULTS ── */
        .results { display: none; }

        .results-header {
            display: flex; align-items: center; gap: 10px;
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            color: var(--ink);
            margin-bottom: 14px;
        }

        .results-header .dot {
            width: 10px; height: 10px;
            background: var(--gold);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            background: var(--cream);
            border: 1px solid var(--border);
        }

        .result-row .r-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--ink);
        }

        .result-row .r-val {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--gold);
        }

        .result-row.total {
            background: var(--gold);
            border-color: var(--gold);
            margin-top: 10px;
        }

        .result-row.total .r-name,
        .result-row.total .r-val {
            color: #fff;
            font-size: 1rem;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0 20px;
        }

        /* ── RESUMEN NUTRICIONAL ── */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 4px;
        }

        .summary-item {
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 12px;
            text-align: center;
        }

        .summary-item .s-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .summary-item .s-val {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            color: var(--gold);
        }

        /* ── PORCENTAJES ── */
        .pct-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .pct-row:last-child { border-bottom: none; }

        .pct-name {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--ink);
            width: 110px;
            flex-shrink: 0;
        }

        .pct-bar-wrap {
            flex: 1;
            height: 8px;
            background: var(--warm);
            border-radius: 99px;
            overflow: hidden;
        }

        .pct-bar {
            height: 100%;
            background: var(--gold);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        .pct-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gold);
            width: 42px;
            text-align: right;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="paw-ring">🐾</div>
        <h1>Cuenco Natural</h1>
        <p class="subtitle">Calculadora de alimentación natural para perros</p>
    </div>

    <!-- INGREDIENTS -->
    <div class="card">
        <div class="section-label">Ingredientes por día</div>
        <div id="lista-ingredientes"></div>
        <button class="btn-add" id="btn-add-ing">＋ Añadir ingrediente</button>
    </div>

    <!-- CONFIG -->
    <div class="card">
        <div class="section-label">Configuración</div>

        <div class="config-row">
            <div class="config-label"><span class="icon">📅</span> Días de preparación</div>
            <input type="number" id="dias" value="7" min="1" max="30">
        </div>

        <div class="config-row">
            <div class="config-label"><span class="icon">🍽</span> Comidas por día</div>
            <input type="number" id="comidas" value="2" min="1" max="5">
        </div>
    </div>

    <!-- BUTTON -->
    <button class="btn-calc" id="btn-calc">🧮 Calcular</button>

    <!-- RESULTS -->
    <div class="results card" id="resultados" style="margin-top:16px;">

        <!-- RESUMEN NUTRICIONAL -->
        <div class="results-header"><div class="dot"></div> Resumen</div>
        <div class="summary-grid" id="resumen-grid"></div>

        <div class="divider"></div>

        <!-- PORCENTAJES -->
        <div class="results-header"><div class="dot"></div> Distribución por ingrediente</div>
        <div id="lista-porcentajes"></div>

        <div class="divider"></div>

        <!-- PORCIÓN POR BOLSA -->
        <div class="results-header"><div class="dot"></div> Porción por bolsa</div>
        <div id="lista-bolsa"></div>

        <div class="divider"></div>

        <!-- LISTA DE COMPRAS -->
        <div class="results-header"><div class="dot"></div> Lista de compras total</div>
        <div id="lista-compras"></div>
    </div>

<script>
    const ingredientesIniciales = [
        { nombre: "Pollo",       gramos: 250 },
        { nombre: "Tilapia",     gramos: 100 },
        { nombre: "Huevo",       gramos: 60  },
        { nombre: "Batata",      gramos: 80  },
        { nombre: "Apio",        gramos: 90  },
        { nombre: "Arándanos",   gramos: 15  },
    ];

    function crearFila(nombre, gramos) {
        const row = document.createElement('div');
        row.className = 'ingredient-row';

        const inputNombre = document.createElement('input');
        inputNombre.type = 'text';
        inputNombre.className = 'ing-name';
        inputNombre.placeholder = 'Ingrediente';
        inputNombre.value = nombre;

        const inputGramos = document.createElement('input');
        inputGramos.type = 'number';
        inputGramos.className = 'ing-weight';
        inputGramos.placeholder = 'g';
        inputGramos.min = '0';
        inputGramos.value = gramos !== '' ? String(gramos) : '';

        const btnTrash = document.createElement('button');
        btnTrash.className = 'btn-trash';
        btnTrash.setAttribute('aria-label', 'Eliminar');
        btnTrash.innerHTML = '🗑';
        btnTrash.addEventListener('click', () => row.remove());

        row.appendChild(inputNombre);
        row.appendChild(inputGramos);
        row.appendChild(btnTrash);

        document.getElementById('lista-ingredientes').appendChild(row);
    }

    ingredientesIniciales.forEach(i => crearFila(i.nombre, i.gramos));

    document.getElementById('btn-add-ing').addEventListener('click', () => crearFila('', ''));
    document.getElementById('btn-calc').addEventListener('click', calcular);

    function calcular() {
        const comidas = parseInt(document.getElementById('comidas').value) || 1;
        const dias    = parseInt(document.getElementById('dias').value) || 1;
        const filas   = document.querySelectorAll('.ingredient-row');

        const ingredientes = [];
        let totalDiario = 0;

        filas.forEach(fila => {
            const nombre = fila.querySelector('.ing-name').value.trim() || 'Sin nombre';
            const gDiarios = parseFloat(fila.querySelector('.ing-weight').value) || 0;
            if (gDiarios <= 0) return;
            ingredientes.push({ nombre, gDiarios });
            totalDiario += gDiarios;
        });

        if (totalDiario === 0) {
            alert('Agrega al menos un ingrediente con gramos mayores a 0.');
            return;
        }

        const totalSemanal  = totalDiario * dias;
        const totalBolsas   = dias * comidas;
        const gPorBolsa     = totalDiario / comidas;

        // ── RESUMEN ──
        const resumenGrid = document.getElementById('resumen-grid');
        resumenGrid.innerHTML = `
            ${summaryItem('Total diario', formatGramos(totalDiario))}
            ${summaryItem('Total (' + dias + ' días)', formatGramos(totalSemanal))}
            ${summaryItem('Bolsas a preparar', totalBolsas)}
            ${summaryItem('Peso por bolsa', formatGramos(gPorBolsa))}
        `;

        // ── PORCENTAJES ──
        let htmlPct = '';
        ingredientes.forEach(ing => {
            const pct = (ing.gDiarios / totalDiario * 100).toFixed(1);
            htmlPct += `
                <div class="pct-row">
                    <span class="pct-name">${ing.nombre}</span>
                    <div class="pct-bar-wrap">
                        <div class="pct-bar" style="width:${pct}%"></div>
                    </div>
                    <span class="pct-label">${pct}%</span>
                </div>`;
        });
        document.getElementById('lista-porcentajes').innerHTML = htmlPct;

        // ── BOLSA ──
        let htmlBolsa = '';
        ingredientes.forEach(ing => {
            const gBolsa = ing.gDiarios / comidas;
            htmlBolsa += resultRow(ing.nombre, gBolsa.toFixed(1) + ' g');
        });
        htmlBolsa += resultRow('TOTAL BOLSA', gPorBolsa.toFixed(1) + ' g', true);
        document.getElementById('lista-bolsa').innerHTML = htmlBolsa;

        // ── COMPRAS ──
        let htmlCompras = '';
        ingredientes.forEach(ing => {
            const gTotal = ing.gDiarios * dias;
            htmlCompras += resultRow(ing.nombre, formatGramos(gTotal));
        });
        htmlCompras += resultRow('TOTAL A PREPARAR', formatGramos(totalSemanal), true);
        document.getElementById('lista-compras').innerHTML = htmlCompras;

        const el = document.getElementById('resultados');
        el.style.display = 'block';
        setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }

    function formatGramos(g) {
        return g >= 1000 ? (g / 1000).toFixed(2) + ' kg' : g.toFixed(1) + ' g';
    }

    function summaryItem(label, val) {
        return `<div class="summary-item">
                    <div class="s-label">${label}</div>
                    <div class="s-val">${val}</div>
                </div>`;
    }

    function resultRow(nombre, valor, total = false) {
        return `<div class="result-row${total ? ' total' : ''}">
                    <span class="r-name">${nombre}</span>
                    <span class="r-val">${valor}</span>
                </div>`;
    }
</script>
</body>
</html>
