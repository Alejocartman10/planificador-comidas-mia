<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Mía</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream:   #faf6ef;
            --warm:    #f0e8d8;
            --gold:    #c8922a;
            --gold-dk: #a57320;
            --ink:     #1c1612;
            --muted:   #7a6e64;
            --danger:  #c0392b;
            --card:    #ffffff;
            --border:  #e8dfd0;
            --shadow:  0 2px 20px rgba(28,22,18,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 16px 60px;
            background-image:
                radial-gradient(ellipse at 10% 0%, rgba(200,146,42,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 100%, rgba(200,146,42,0.06) 0%, transparent 55%);
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 12px;
        }

        .paw-ring {
            width: 72px; height: 72px;
            background: var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 4px 18px rgba(200,146,42,0.35);
            font-size: 2rem;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.1rem;
            letter-spacing: -0.5px;
            color: var(--ink);
            line-height: 1.1;
        }

        .subtitle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 28px 24px;
            margin-bottom: 16px;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 16px;
        }

        /* ── INGREDIENT ROWS ── */
        .ingredient-row {
            display: grid;
            grid-template-columns: 1fr 90px 36px;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        /* ── INPUTS — fix universal Safari/Chrome ── */
        input[type="text"],
        input[type="number"] {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--ink);
            background: var(--cream);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 11px 13px;
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            /* Safari fix */
            -webkit-text-fill-color: var(--ink);
            opacity: 1;
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: var(--muted);
            -webkit-text-fill-color: var(--muted);
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200,146,42,0.12);
            background: #fff;
        }

        input[type="number"] {
            text-align: center;
        }

        /* number spinner hidden */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type="number"] { -moz-appearance: textfield; }

        /* ── TRASH BUTTON ── */
        .btn-trash {
            background: none;
            border: none;
            cursor: pointer;
            color: #c0a090;
            font-size: 1.15rem;
            padding: 6px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.2s, background 0.2s;
            -webkit-appearance: none;
            width: auto;
            box-shadow: none;
        }

        .btn-trash:hover {
            color: var(--danger);
            background: #fdecea;
            transform: none;
        }

        /* ── ADD BUTTON ── */
        .btn-add {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            background: transparent;
            color: var(--gold);
            border: 1.5px dashed rgba(200,146,42,0.4);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: background 0.2s, border-color 0.2s;
            box-shadow: none;
            -webkit-appearance: none;
        }

        .btn-add:hover {
            background: rgba(200,146,42,0.05);
            border-color: var(--gold);
            transform: none;
        }

        /* ── CONFIG ROW ── */
        .config-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .config-row:last-child { border-bottom: none; }

        .config-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .config-label .icon { font-size: 1.1rem; }

        .config-row input[type="number"] {
            width: 80px;
        }

        /* ── CALCULATE BUTTON ── */
        .btn-calc {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 16px rgba(200,146,42,0.35);
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .btn-calc:hover {
            background: var(--gold-dk);
            transform: translateY(-2px);
            box-shadow: 0 7px 22px rgba(200,146,42,0.4);
        }

        .btn-calc:active { transform: translateY(0); }

        /* ── RESULTS ── */
        .results { display: none; }

        .results-header {
            display: flex; align-items: center; gap: 10px;
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            color: var(--ink);
            margin-bottom: 14px;
        }

        .results-header .dot {
            width: 10px; height: 10px;
            background: var(--gold);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            background: var(--cream);
            border: 1px solid var(--border);
        }

        .result-row .r-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--ink);
        }

        .result-row .r-val {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--gold);
        }

        .result-row.total {
            background: var(--gold);
            border-color: var(--gold);
            margin-top: 10px;
        }

        .result-row.total .r-name,
        .result-row.total .r-val {
            color: #fff;
            font-size: 1rem;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="paw-ring">🐾</div>
        <h1>Planificador Mía</h1>
        <p class="subtitle">Calculadora de alimentación natural</p>
    </div>

    <!-- INGREDIENTS -->
    <div class="card">
        <div class="section-label">Ingredientes por día</div>
        <div id="lista-ingredientes"></div>
        <button class="btn-add" id="btn-add-ing">
            ＋ Añadir ingrediente
        </button>
    </div>

    <!-- CONFIG -->
    <div class="card">
        <div class="section-label">Configuración</div>

        <div class="config-row">
            <div class="config-label"><span class="icon">📅</span> Días de preparación</div>
            <input type="number" id="dias" value="7" min="1" max="30">
        </div>

        <div class="config-row">
            <div class="config-label"><span class="icon">🍽</span> Comidas por día</div>
            <input type="number" id="comidas" value="2" min="1" max="5">
        </div>
    </div>

    <!-- BUTTON -->
    <button class="btn-calc" id="btn-calc">
        🧮 Calcular
    </button>

    <!-- RESULTS -->
    <div class="results card" id="resultados" style="margin-top:16px;">
        <div class="results-header"><div class="dot"></div> Porción por bolsa</div>
        <div id="lista-bolsa"></div>

        <div class="divider"></div>

        <div class="results-header"><div class="dot"></div> Lista de compras total</div>
        <div id="lista-compras"></div>
    </div>

<script>
    const ingredientesIniciales = [
        { nombre: "Pollo Magro",  gramos: 350 },
        { nombre: "Huevo",        gramos: 60  },
        { nombre: "Batata",       gramos: 80  },
        { nombre: "Apio",         gramos: 90  },
        { nombre: "Arándanos",    gramos: 15  },
    ];

    /* 
     * FIX SAFARI/CHROME MÓVIL:
     * Se crean los elementos con createElement y se asigna .value
     * directamente en JS (no mediante innerHTML con value="..."),
     * que es lo que hace que Safari no muestre el texto.
     */
    function crearFila(nombre, gramos) {
        const row = document.createElement('div');
        row.className = 'ingredient-row';

        const inputNombre = document.createElement('input');
        inputNombre.type = 'text';
        inputNombre.className = 'ing-name';
        inputNombre.placeholder = 'Ingrediente';
        inputNombre.value = nombre;          // asignación directa ✓

        const inputGramos = document.createElement('input');
        inputGramos.type = 'number';
        inputGramos.className = 'ing-weight';
        inputGramos.placeholder = 'g';
        inputGramos.min = '0';
        inputGramos.value = gramos !== '' ? String(gramos) : '';  // asignación directa ✓

        const btnTrash = document.createElement('button');
        btnTrash.className = 'btn-trash';
        btnTrash.setAttribute('aria-label', 'Eliminar');
        btnTrash.innerHTML = '🗑';
        btnTrash.addEventListener('click', () => row.remove());

        row.appendChild(inputNombre);
        row.appendChild(inputGramos);
        row.appendChild(btnTrash);

        document.getElementById('lista-ingredientes').appendChild(row);
    }

    // Carga inicial
    ingredientesIniciales.forEach(i => crearFila(i.nombre, i.gramos));

    document.getElementById('btn-add-ing').addEventListener('click', () => crearFila('', ''));

    document.getElementById('btn-calc').addEventListener('click', calcular);

    function calcular() {
        const comidas = parseInt(document.getElementById('comidas').value) || 1;
        const dias    = parseInt(document.getElementById('dias').value) || 1;
        const filas   = document.querySelectorAll('.ingredient-row');

        let htmlBolsa = '', totalBolsa = 0;
        let htmlCompras = '', totalCompras = 0;

        filas.forEach(fila => {
            const nombre = fila.querySelector('.ing-name').value.trim() || 'Sin nombre';
            const gDiarios = parseFloat(fila.querySelector('.ing-weight').value) || 0;
            if (gDiarios <= 0) return;

            const gBolsa = gDiarios / comidas;
            totalBolsa += gBolsa;
            htmlBolsa += resultRow(nombre, gBolsa.toFixed(1) + ' g');

            const gTotal = gDiarios * dias;
            totalCompras += gTotal;
            const textoTotal = gTotal >= 1000
                ? (gTotal / 1000).toFixed(2) + ' kg'
                : gTotal + ' g';
            htmlCompras += resultRow(nombre, textoTotal);
        });

        if (totalBolsa === 0) {
            alert('Agrega al menos un ingrediente con gramos mayores a 0.');
            return;
        }

        htmlBolsa   += resultRow('TOTAL BOLSA', totalBolsa.toFixed(1) + ' g', true);
        const ttxto = totalCompras >= 1000
            ? (totalCompras / 1000).toFixed(2) + ' kg'
            : totalCompras + ' g';
        htmlCompras += resultRow('TOTAL A PREPARAR', ttxto, true);

        document.getElementById('lista-bolsa').innerHTML   = htmlBolsa;
        document.getElementById('lista-compras').innerHTML = htmlCompras;

        const el = document.getElementById('resultados');
        el.style.display = 'block';
        setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }

    function resultRow(nombre, valor, total = false) {
        return `<div class="result-row${total ? ' total' : ''}">
                    <span class="r-name">${nombre}</span>
                    <span class="r-val">${valor}</span>
                </div>`;
    }
</script>
</body>
</html>
